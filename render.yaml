# Render deployment configuration
# See README.md for deployment instructions

services:
  - type: web
    name: spur-chat-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: MAX_TOKENS
        value: "500"
      - key: FRONTEND_URL
        value: "*"  # Update with your actual frontend URL
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1

  - type: static
    name: spur-chat-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: VITE_API_URL
        value: https://spur-chat-backend.onrender.com  # Update with your actual backend URL
