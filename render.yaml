# Render Blueprint — deploys both backend and frontend automatically
# Usage: Render Dashboard → Blueprints → New Blueprint Instance → connect repo
# After deploy, manually set OPENAI_API_KEY in the backend service env vars.

services:
  - type: web
    name: spur-chat-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard — never commit API keys
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: MAX_TOKENS
        value: "500"
      - key: FRONTEND_URL
        value: "*"  # Update after frontend deploy, then redeploy backend
      - key: REDIS_URL
        sync: false  # Optional: set if using Upstash Redis
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1

  - type: static
    name: spur-chat-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: VITE_API_URL
        value: https://spur-chat-backend.onrender.com  # Update after backend deploy
