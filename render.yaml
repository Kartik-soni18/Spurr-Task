# Render Blueprint — deploys both backend and frontend automatically
# Usage: Render Dashboard → Blueprints → New Blueprint Instance → connect repo
# After deploy, manually set OPENAI_API_KEY, OPENAI_BASE_URL, and REDIS_URL
# in the Render Dashboard when prompted by the Blueprint wizard.

services:
  - type: web
    name: spur-chat-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard — never commit API keys
      - key: OPENAI_MODEL
        value: meta-llama/Llama-3.3-70B-Instruct-Turbo
      - key: OPENAI_BASE_URL
        sync: false  # e.g. https://api.openai.com/v1 or https://api.together.xyz/v1
      - key: MAX_TOKENS
        value: "500"
      - key: FRONTEND_URL
        value: https://spur-chat-frontend-wnpt.onrender.com
      - key: REDIS_URL
        sync: false  # Optional: set if using Upstash Redis
    # Note: No persistent disk — free tier only. SQLite data is lost on redeploy.
    # For production, add a disk (requires paid plan) or switch to Render Postgres.

  - type: web
    name: spur-chat-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: VITE_API_URL
        value: https://spur-chat-backend-dqy8.onrender.com
